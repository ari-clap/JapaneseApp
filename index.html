<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FAFAF8" />
  <title>日本語 Phrase Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #FAFAF8; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #F5F4EE;
      --color-background-tertiary: #FAFAF8;
      --color-background-info: #E6F1FB;
      --color-background-danger: #FCEBEB;
      --color-background-success: #EAF3DE;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-info: #185FA5;
      --color-text-danger: #A32D2D;
      --color-text-success: #3B6D11;
      --color-border-tertiary: #E5E5E0;
      --color-border-secondary: #D5D5D0;
      --color-border-info: #378ADD;
      --color-border-success: #7BB33A;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
    }
    button { font-family: inherit; }
    input, textarea { -webkit-appearance: none; appearance: none; }
    #loading { display: flex; min-height: 100vh; align-items: center; justify-content: center; color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Loading…</div></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
